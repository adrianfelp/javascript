<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu primeiro programa</title>
    <style>
        body {
            background-color: rgba(68, 68, 233, 0.438);
            color: white;
            font-size: 20pt;
            font-family: Verdana, Geneva, Tahoma, sans-serif;
            padding: 20px;
        }
    </style>
</head>
<body>
    <h1>Olá, mundo!</h1>
    <p>Já me livrei da maldição</p>

    <!-- O window.prompt retorna uma string mesmo se for número
     Precisa converter uma string para número:
     1 - Number.paseInt(n) conversão para um número inteiro
     2 - Number.parseFloat(n) conversão para um numero real, com virgula
     3 - Number já converte automaticamente para número inteiro ou decimal.
     -->

     <!--Conversão agora de número para string:
     1 -  String(n)
     2 - n.toString()
     -->
    <script>
        var n1 = Number.parseInt(window.prompt('Digite um número: '))
        var n2 = Number.parseInt(window.prompt('Digite outro número: '))
        var s = n1 + n2
        window.alert('A soma dos valores é: ' + s)
        // Tipos de dados, o + poder servir para:
        // + adição 
        // + concatenação
    </script>
</body>
</html>
