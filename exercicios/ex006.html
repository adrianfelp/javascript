<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiros passoa com DOM</title>
    <style>
        body {
            background-color: rgb(81, 69, 255);
            color: white;
            font: normal 18pt Arial;
        }
    </style>
</head>
<body>
    <h1>Iniciando estudos com DOM</h1>    
    <p>Aqui vai o resultado div</p>
    <p>Aprendendo usar o <strong>DOM</strong> em JavaScript.</p>
    <div id="msg">Clique em mim</div>
    <script>
        var p1 = window.document.getElementsByTagName('p')[0] // usando colchete
        var d = window.document.getElementById('msg') // Se não for singular não precisa usar colchete
        d.style.background = 'black'
        d.innerText = 'Estou aguardando...'   // Definir o conteúdo de texto de um elemento
    </script>
</body>
</html>
