<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
        font: normal 20pt Arial;
        }
    </style>
</head>
<body>

<!--
    Fortamando Números:
> var n1 = 1545.5
undefined
> n1
1545.5
> n1.toFixed(2)
'1545.50'
> n1.toFixed(2).replace('.',',')
'1545,50'
> n1.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'})
'R$ 1.545,50'
-->
    <script>
        var nome = window.prompt('Qual é seu nome?')
        document.write(`Olá, ${nome}! Seu nome tem ${nome.length} letras. <br/>`) //quantos caracteres a string tem
        document.write(`Seu nome em maiúsculo é ${nome.toUpperCase()} <br/>`) //tudo para letras maiscúlas
        document.write(`Seu nome em minísculo é ${nome.toLowerCase()}`) //tudo para letras minúsculas
    </script>
</body>
</html>
